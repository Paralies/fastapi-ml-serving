name: fastapi-ml-serving-canary

on:
  workflow_dispatch:             # 수동 실행만 (canary는 의도적으로 트리거)
    inputs:
      image_tag:
        description: "배포할 이미지 태그 (예: abc1234). 비워두면 latest SHA 사용"
        required: false

permissions:
  contents: read

env:
  HARBOR_REGISTRY: ${{ vars.HARBOR_REGISTRY }}
  HARBOR_PROJECT: ${{ vars.HARBOR_PROJECT }}
  IMAGE_NAME: ${{ vars.IMAGE_NAME }}
  AWS_REGION: ${{ vars.AWS_REGION }}
  EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME }}
  K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE }}

jobs:
  # ── Job 1: Canary 배포 (10% 트래픽) ────────────────────────────────────
  canary-deploy:
    name: Deploy Canary (10% Traffic)
    runs-on: ubuntu-latest
    outputs:
      canary_image: ${{ steps.meta.outputs.canary_image }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: meta
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            TAG="${{ github.event.inputs.image_tag }}"
          else
            TAG=$(echo "${GITHUB_SHA}" | cut -c1-7)
          fi
          echo "canary_image=${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${IMAGE_NAME}:${TAG}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region "${AWS_REGION}" --name "${EKS_CLUSTER_NAME}"

      - name: Substitute canary image tag
        run: |
          CANARY_IMAGE="${{ steps.meta.outputs.canary_image }}"
          sed -i "s|CANARY_IMAGE_PLACEHOLDER|${CANARY_IMAGE}|g" manifests/deployment-canary.yaml
          # 재배포 시 기존 태그 교체
          sed -i "s|${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${IMAGE_NAME}:.*|${CANARY_IMAGE}|g" manifests/deployment-canary.yaml

      - name: Deploy canary (10% traffic)
        run: |
          kubectl apply -f manifests/deployment-canary.yaml -n "${K8S_NAMESPACE}"
          kubectl apply -f manifests/service-canary.yaml    -n "${K8S_NAMESPACE}"
          kubectl apply -f manifests/ingress-canary.yaml    -n "${K8S_NAMESPACE}"

      - name: Wait for canary rollout
        run: |
          kubectl -n "${K8S_NAMESPACE}" rollout status \
            deployment/sk009-fastapi-ml-serving-canary --timeout=180s

      - name: Show canary pod status
        run: |
          echo "=== Canary Pods ==="
          kubectl -n "${K8S_NAMESPACE}" get pods -l track=canary -o wide
          echo ""
          echo "=== Canary Image ==="
          echo "${{ steps.meta.outputs.canary_image }}"
          echo ""
          echo "✅ Canary 배포 완료 — 트래픽 10% 분배 중"
          echo "👉 검증 후 'canary-promote' workflow를 수동 실행하여 승격하거나"
          echo "   'canary-rollback' workflow를 실행하여 롤백하세요."

  # ── Job 2: 수동 승인 대기 ───────────────────────────────────────────────
  wait-for-approval:
    name: Wait for Manual Approval
    runs-on: ubuntu-latest
    needs: canary-deploy
    environment:
      name: canary-approval         # GitHub Environment 보호 규칙 활용
                                    # Settings > Environments > canary-approval
                                    # → Required reviewers 설정 필요

    steps:
      - name: Approval gate
        run: |
          echo "✋ 수동 승인 대기 중..."
          echo "Canary 이미지: ${{ needs.canary-deploy.outputs.canary_image }}"
          echo "승인 시 promote job이 실행됩니다."

  # ── Job 3: Promote — Canary → Stable 전체 승격 ─────────────────────────
  canary-promote:
    name: Promote Canary to Stable (100% Traffic)
    runs-on: ubuntu-latest
    needs: [canary-deploy, wait-for-approval]

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region "${AWS_REGION}" --name "${EKS_CLUSTER_NAME}"

      - name: Promote — stable deployment에 canary 이미지 적용
        run: |
          CANARY_IMAGE="${{ needs.canary-deploy.outputs.canary_image }}"
          kubectl -n "${K8S_NAMESPACE}" set image \
            deployment/sk009-fastapi-ml-serving \
            sk009-fastapi-ml-serving="${CANARY_IMAGE}"

      - name: Wait for stable rollout
        run: |
          kubectl -n "${K8S_NAMESPACE}" rollout status \
            deployment/sk009-fastapi-ml-serving --timeout=300s

      - name: Remove canary resources
        run: |
          kubectl delete -f manifests/ingress-canary.yaml    -n "${K8S_NAMESPACE}" --ignore-not-found
          kubectl delete -f manifests/service-canary.yaml    -n "${K8S_NAMESPACE}" --ignore-not-found
          kubectl delete -f manifests/deployment-canary.yaml -n "${K8S_NAMESPACE}" --ignore-not-found

      - name: Promotion complete
        run: |
          echo "🎉 Canary 승격 완료!"
          echo "Stable 이미지: ${{ needs.canary-deploy.outputs.canary_image }}"
          kubectl -n "${K8S_NAMESPACE}" get pods -l app=sk009-fastapi-ml-serving -o wide