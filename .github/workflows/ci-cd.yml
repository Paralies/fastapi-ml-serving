name: fastapi-ml-serving-ci-cd

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  HARBOR_REGISTRY: ${{ vars.HARBOR_REGISTRY }}
  HARBOR_PROJECT: ${{ vars.HARBOR_PROJECT }}
  IMAGE_NAME: ${{ vars.IMAGE_NAME }}
  AWS_REGION: ${{ vars.AWS_REGION }}
  EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME }}
  K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE }}

jobs:
  # ── Job 1: CI — 이미지 빌드 & Harbor Push ────────────────────────────────
  ci:
    name: Build Image and Push to Harbor
    runs-on: ubuntu-latest
    outputs:
      full_image: ${{ steps.meta.outputs.full_image }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Compute image tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          echo "full_image=${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${IMAGE_NAME}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push to Harbor
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.full_image }}
            ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:latest

  # ── Job 2: CD — EKS 배포 ─────────────────────────────────────────────────
  cd:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/
          kubectl version --client

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig --region "${AWS_REGION}" --name "${EKS_CLUSTER_NAME}"

      - name: Verify AWS identity and cluster access
        run: |
          aws sts get-caller-identity
          kubectl get ns

      - name: Substitute image tag in deployment manifest
        run: |
          sed -i "s|FULL_IMAGE_PLACEHOLDER|${{ needs.ci.outputs.full_image }}|g" manifests/deployment.yaml

      - name: Apply ConfigMap (Fluentd)
        run: |
          kubectl apply -f manifests/configmap-fluentd.yaml -n "${K8S_NAMESPACE}"

      - name: Apply Deployment
        run: |
          kubectl apply -f manifests/deployment.yaml -n "${K8S_NAMESPACE}"

      - name: Apply Service
        run: |
          kubectl apply -f manifests/service.yaml -n "${K8S_NAMESPACE}"

      - name: Wait for rollout
        run: |
          kubectl -n "${K8S_NAMESPACE}" rollout status deployment/${{ env.IMAGE_NAME }} --timeout=300s

      - name: Show deployed pods
        run: |
          kubectl -n "${K8S_NAMESPACE}" get pods -l app=${{ env.IMAGE_NAME }} -o wide
      - name: Apply Ingress
        run: |
          kubectl apply -f manifests/ingress.yaml -n "${K8S_NAMESPACE}"