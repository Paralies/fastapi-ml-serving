name: fastapi-ml-serving-bluegreen

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "배포할 이미지 태그 (비워두면 latest 사용)"
        required: false
        default: "latest"
      target:
        description: "배포 대상 슬롯"
        required: true
        default: "green"
        type: choice
        options:
          - blue
          - green

permissions:
  contents: read

env:
  HARBOR_REGISTRY: ${{ vars.HARBOR_REGISTRY }}
  HARBOR_PROJECT: ${{ vars.HARBOR_PROJECT }}
  IMAGE_NAME: ${{ vars.IMAGE_NAME }}
  AWS_REGION: ${{ vars.AWS_REGION }}
  EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME }}
  K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE }}

jobs:
  # ── Job 1: 새 버전 슬롯 배포 ─────────────────────────────────────────────
  deploy-new-version:
    name: Deploy ${{ github.event.inputs.target }} (new version)
    runs-on: ubuntu-latest
    outputs:
      new_image: ${{ steps.meta.outputs.new_image }}
      target: ${{ github.event.inputs.target }}
      current: ${{ steps.meta.outputs.current }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Resolve image and current slot
        id: meta
        run: |
          TAG="${{ github.event.inputs.image_tag }}"
          if [ -z "${TAG}" ]; then TAG="latest"; fi
          NEW_IMAGE="${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${IMAGE_NAME}:${TAG}"
          echo "new_image=${NEW_IMAGE}" >> "$GITHUB_OUTPUT"

          TARGET="${{ github.event.inputs.target }}"
          if [ "${TARGET}" = "green" ]; then
            echo "current=blue" >> "$GITHUB_OUTPUT"
          else
            echo "current=green" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region "${AWS_REGION}" --name "${EKS_CLUSTER_NAME}"

      - name: Substitute image tag in deployment manifest
        run: |
          TARGET="${{ github.event.inputs.target }}"
          NEW_IMAGE="${{ steps.meta.outputs.new_image }}"
          MANIFEST="manifests/deployment-${TARGET}.yaml"

          sed -i "s|BLUE_IMAGE_PLACEHOLDER|${NEW_IMAGE}|g" "${MANIFEST}"
          sed -i "s|GREEN_IMAGE_PLACEHOLDER|${NEW_IMAGE}|g" "${MANIFEST}"
          sed -i "s|${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${IMAGE_NAME}:.*|${NEW_IMAGE}|g" "${MANIFEST}"

          echo "=== 치환된 이미지 확인 ==="
          grep "image:" "${MANIFEST}"

      - name: Delete existing deployment and re-apply
        run: |
          TARGET="${{ github.event.inputs.target }}"
          MANIFEST="manifests/deployment-${TARGET}.yaml"

          # 이전 상태 완전 초기화 후 재생성 (--ignore-not-found: 최초 배포 시 에러 방지)
          kubectl delete deployment sk009-fastapi-ml-serving-${TARGET} \
            -n "${K8S_NAMESPACE}" --ignore-not-found

          kubectl apply -f "${MANIFEST}" -n "${K8S_NAMESPACE}"
          kubectl apply -f manifests/service-bluegreen.yaml -n "${K8S_NAMESPACE}"

      - name: Wait for rollout
        run: |
          TARGET="${{ github.event.inputs.target }}"
          kubectl -n "${K8S_NAMESPACE}" rollout status \
            deployment/sk009-fastapi-ml-serving-${TARGET} --timeout=180s

      - name: Show new version pods
        run: |
          TARGET="${{ github.event.inputs.target }}"
          CURRENT="${{ steps.meta.outputs.current }}"
          echo "=== ${TARGET} Pods ==="
          kubectl -n "${K8S_NAMESPACE}" get pods -l track=${TARGET} -o wide
          echo ""
          echo "✅ ${TARGET} 배포 완료"
          echo "👉 현재 트래픽은 ${CURRENT}으로 유지 중"
          echo "👉 검증 후 수동 승인하면 Ingress가 ${TARGET}으로 전환됩니다."

  # ── Job 2: 수동 승인 대기 ───────────────────────────────────────────────
  wait-for-approval:
    name: Wait for Manual Approval
    runs-on: ubuntu-latest
    needs: deploy-new-version
    environment:
      name: bluegreen-approval    # Settings > Environments > bluegreen-approval
                                  # → Required reviewers 설정 필요
    steps:
      - name: Approval gate
        run: |
          echo "✋ 수동 승인 대기 중..."
          echo "새 버전 슬롯  : ${{ needs.deploy-new-version.outputs.target }}"
          echo "새 버전 이미지: ${{ needs.deploy-new-version.outputs.new_image }}"
          echo "현재 서비스   : ${{ needs.deploy-new-version.outputs.current }}"

  # ── Job 3: Ingress 전환 (Zero Downtime) ─────────────────────────────────
  switch-traffic:
    name: Switch traffic → ${{ needs.deploy-new-version.outputs.target }}
    runs-on: ubuntu-latest
    needs: [deploy-new-version, wait-for-approval]

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region "${AWS_REGION}" --name "${EKS_CLUSTER_NAME}"

      - name: Switch Ingress backend via patch
        run: |
          TARGET="${{ needs.deploy-new-version.outputs.target }}"
          CURRENT="${{ needs.deploy-new-version.outputs.current }}"

          kubectl patch ingress sk009-ingress \
            -n "${K8S_NAMESPACE}" \
            --type=json \
            -p="[{\"op\":\"replace\",\"path\":\"/spec/rules/0/http/paths/0/backend/service/name\",\"value\":\"sk009-${TARGET}\"}]"

          echo "🔀 트래픽 전환 완료: sk009-${CURRENT} → sk009-${TARGET}"

      - name: Scale down old slot
        run: |
          CURRENT="${{ needs.deploy-new-version.outputs.current }}"
          kubectl -n "${K8S_NAMESPACE}" scale deployment \
            sk009-fastapi-ml-serving-${CURRENT} --replicas=0
          echo "⏬ ${CURRENT} 슬롯 scale down 완료 (롤백 시 scale up으로 복구 가능)"

      - name: Final status
        run: |
          TARGET="${{ needs.deploy-new-version.outputs.target }}"
          CURRENT="${{ needs.deploy-new-version.outputs.current }}"
          echo "🎉 Blue/Green 배포 완료!"
          echo "활성 슬롯: ${TARGET} (트래픽 100%)"
          echo "대기 슬롯: ${CURRENT} (replicas=0)"
          kubectl -n "${K8S_NAMESPACE}" get pods -l app=sk009-zero-dtd-test -o wide
          kubectl -n "${K8S_NAMESPACE}" get ingress sk009-ingress