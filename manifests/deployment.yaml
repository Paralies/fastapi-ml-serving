apiVersion: apps/v1
kind: Deployment
metadata:
  name: sk009-fastapi-ml-serving
  namespace: skala3-ai1
  labels:
    app: sk009-fastapi-ml-serving
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sk009-fastapi-ml-serving
  template:
    metadata:
      labels:
        app: sk009-fastapi-ml-serving
    spec:
      securityContext:
        fsGroup: 1000    # fluent 유저 GID → PVC 마운트 디렉토리 그룹 소유권 부여
      volumes:
        - name: app-logs              # 앱 → Fluentd 로그 전달용 (emptyDir 유지)
          emptyDir: {}
        - name: sk009-fluentd-pos     # Fluentd pos 파일 + 로그 영구 저장 (PVC)
          persistentVolumeClaim:
            claimName: sk009-fluentd-log-pvc
        - name: sk009-fluentd-config  # ConfigMap으로 주입되는 Fluentd 설정
          configMap:
            name: sk009-fluentd-config

      containers:
        # 메인 앱 컨테이너
        - name: sk009-fastapi-ml-serving
          image: FULL_IMAGE_PLACEHOLDER   # CI에서 sed로 치환됨
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: app-logs
              mountPath: /var/log/app
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          env:
            - name: MY_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: MY_POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace

        # Fluentd 사이드카 컨테이너
        - name: sk009-fluentd
          image: fluent/fluentd:v1.16-1
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
          env:
            - name: MY_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: MY_POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            - name: app-logs            # 앱이 쓴 로그 파일 읽기
              mountPath: /var/log/app
            - name: sk009-fluentd-pos   # pos 파일 + 로그 영구 저장 (PVC)
              mountPath: /var/log/fluentd
            - name: sk009-fluentd-config
              mountPath: /fluentd/etc