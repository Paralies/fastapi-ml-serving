apiVersion: apps/v1
kind: Deployment
metadata:
  name: sk009-fastapi-ml-serving
  namespace: skala3-ai1
  labels:
    app: sk009-fastapi-ml-serving
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sk009-fastapi-ml-serving
  template:
    metadata:
      labels:
        app: sk009-fastapi-ml-serving
    spec:
      # 공유 볼륨 정의
      volumes:
        - name: app-logs
          emptyDir: {}
        - name: sk009-fluentd-pos
          emptyDir: {}
        - name: sk009-fluentd-config
          configMap:
            name: sk009-fluentd-config 

      containers:
        # 메인 앱 컨테이너 
        - name: sk009-fastapi-ml-serving
          image: FULL_IMAGE_PLACEHOLDER # CI에서 sed로 치환됨
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          # 로그를 공유 볼륨에 파일로 출력하려면 앱에서 /var/log/app/app.log 로 쓰도록 설정
          # 현재 실습 앱은 stdout -> Fluentd tail로 수집
          volumeMounts:
            - name: app-logs
              mountPath: /var/log/app
          # 헬스체크: /health 엔드포인트 활용
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          env:
            - name: MY_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: MY_POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace

        # Fluentd 사이드카 컨테이너
        - name: sk009-fluentd
          image: fluent/fluentd:v1.16-1
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
          env:
            - name: MY_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: MY_POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            - name: app-logs # 앱이 쓴 로그 파일 읽기
              mountPath: /var/log/app
            - name: sk009-fluentd-pos # pos 파일 저장
              mountPath: /var/log/fluentd
            - name: sk009-fluentd-config # ConfigMap -> /fluentd/etc/fluent.conf
              mountPath: /fluentd/etc