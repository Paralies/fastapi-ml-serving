apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sk009-fastapi-ml-serving
  namespace: skala3-ai1
  labels:
    app: sk009-fastapi-ml-serving
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: ingress.skala25a.project.skala3-ai1.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sk009-fastapi-ml-serving
                port:
                  number: 80