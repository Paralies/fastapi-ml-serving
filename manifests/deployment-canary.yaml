apiVersion: apps/v1
kind: Deployment
metadata:
  name: sk009-fastapi-ml-serving-canary
  namespace: skala3-ai1
  labels:
    app: sk009-fastapi-ml-serving
    track: canary
spec:
  replicas: 1                          # stable 대비 소수 유지 (10% 트래픽 목적)
  selector:
    matchLabels:
      app: sk009-fastapi-ml-serving
      track: canary
  template:
    metadata:
      labels:
        app: sk009-fastapi-ml-serving
        track: canary
    spec:
      securityContext:
        fsGroup: 1000
      strategy:
        type: Recreate
      volumes:
        - name: app-logs
          emptyDir: {}
        - name: sk009-fluentd-pos
          emptyDir: {}                 # canary는 별도 PVC 불필요
        - name: sk009-fluentd-config
          configMap:
            name: sk009-fluentd-config

      containers:
        - name: sk009-fastapi-ml-serving
          image: CANARY_IMAGE_PLACEHOLDER   # CI에서 새 이미지로 치환
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: app-logs
              mountPath: /var/log/app
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          env:
            - name: MY_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: MY_POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace

        - name: sk009-fluentd
          image: fluent/fluentd:v1.16-1
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
          env:
            - name: MY_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: MY_POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            - name: app-logs
              mountPath: /var/log/app
            - name: sk009-fluentd-pos
              mountPath: /var/log/fluentd
            - name: sk009-fluentd-config
              mountPath: /fluentd/etc